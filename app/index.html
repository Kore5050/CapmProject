<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>CapmProject — CAP Dashboard</title>
    <style>
        :root {
            --primary: #0b3c5d;
            --primary-dark: #082a42;
            --primary-light: #145a8a;
            --surface: #ffffff;
            --text: #1a1a1a;
            --muted: #5a6a75;
            --border: #d9e2ea;
            --shadow: 0 12px 32px rgba(11, 60, 93, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            color: var(--text);
            background: linear-gradient(160deg, #f4f8fb 0%, #e8f0f6 45%, #f9fbfd 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .dashboard {
            width: min(720px, 100%);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .dashboard-header {
            background: var(--primary);
            color: #fff;
            padding: 32px 36px 28px;
        }

        .dashboard-header h1 {
            margin: 0 0 8px;
            font-size: 1.75rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        .dashboard-header p {
            margin: 0;
            font-size: 1rem;
            opacity: 0.92;
            line-height: 1.5;
        }

        .dashboard-body {
            padding: 32px 36px 36px;
        }

        .dashboard-body h2 {
            margin: 0 0 12px;
            font-size: 1.125rem;
            color: var(--primary);
        }

        .dashboard-body p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.6;
        }

        .launch-pad {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 14px 28px;
            background: var(--primary);
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            border: none;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .launch-pad:hover {
            background: var(--primary-light);
            transform: translateY(-1px);
        }

        .launch-pad:active {
            background: var(--primary-dark);
            transform: translateY(0);
        }

        .meta {
            margin-top: 28px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
            font-size: 0.875rem;
            color: var(--muted);
        }

        .meta code {
            background: #f0f4f8;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.8125rem;
        }
    </style>
</head>
<body>
    <main class="dashboard">
        <header class="dashboard-header">
            <h1>CapmProject</h1>
            <p>SAP Cloud Application Programming Model — local development dashboard</p>
        </header>
        <section class="dashboard-body">
            <h2>Products Catalog</h2>
            <p>
                Open the Fiori Elements preview for <strong>CatalogService.Products</strong>
                with live OData data and UI annotations from your CAP backend.
            </p>
            <a class="launch-pad" href="/$fiori-preview/CatalogService/Products#preview-app">
                Launch Products App
            </a>
            <div class="meta">
                Service endpoint: <code>/odata/v4/catalog/Products</code>
            </div>
        </section>
    </main>
</body>
</html>
